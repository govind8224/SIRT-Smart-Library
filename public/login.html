<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Library | Secure Login</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/login.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
</head>

<body>
    <canvas id="webgl-canvas"></canvas>

    <!-- Subtle Ambient Glow Effects -->
    <div id="glow-bg-top"></div>
    <div id="glow-bg-bottom"></div>

    <div class="login-container glass card">
        <div class="icon-wrapper cyan avatar">
            <i class="ph ph-graduation-cap"></i>
        </div>
        <h2>Welcome Back</h2>
        <p class="subtitle">Please authenticate to continue</p>

        <form id="loginForm">
            <div class="input-group">
                <div class="input-container">
                    <i class="ph ph-user"></i>
                    <input type="text" id="username" placeholder="Username/Email" required>
                </div>
            </div>

            <div class="input-group">
                <div class="input-container">
                    <i class="ph ph-lock-key"></i>
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="button" class="toggle-password" id="toggleBtn">
                        <i class="ph ph-eye"></i>
                    </button>
                </div>
            </div>

            <div class="input-group">
                <div class="input-container">
                    <i class="ph ph-users"></i>
                    <select id="role" required>
                        <option value="" disabled selected>Select Role</option>
                        <option value="admin">System Admin</option>
                        <option value="student">Student</option>
                        <option value="faculty">Faculty</option>
                    </select>
                </div>
            </div>

            <div class="extra-options">
                <label class="remember-me"><input type="checkbox"> Remember me</label>
                <a href="#">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary login-btn">
                <span>Login</span> <i class="ph ph-arrow-right"></i>
            </button>
        </form>
        <p id="errorMsg" style="color:var(--danger); font-size: 13px; margin-top:15px;"></p>
    </div>

    <script src="js/login.js"></script>
</body>

</html>
